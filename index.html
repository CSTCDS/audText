<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>audioTexte - PWA</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main>
    <header>
      <h1>audioTexte</h1>
    </header>

    <section id="top">
      <div id="text-area" class="text-area">Chargement du texte...</div>
    </section>

    <section id="buttons-area">
      <div class="buttons-grid">
        <button class="sound-btn" data-sound="applaudissements.mp3">Applaudissements</button>
        <button class="sound-btn" data-sound="fortboyardtheme.mp3">Fort Boyard</button>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js').catch(e => console.log('SW registration failed', e));
    }
  </script>
</body>
</html>
